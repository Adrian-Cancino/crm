{% load static %}

<nav class="navbar navbar-expand-lg bg-body-tertiary g-dbark" data-bs-theme="dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'home' %}">CRM</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        {% if request.user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Bienvenido: {{ request.user.first_name|default:request.user.username }}</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'registro_agregar' %}">Agregar Registro</a>
        </li>
        <li class="nav-item d-flex align-items-center">
          <form action="{% url 'logout' %}" method="post" class="h-100 m-0">
              {% csrf_token %}
              <button type="submit" class="btn btn-link nav-link p-0 h-100 d-flex align-items-center">
                  <i class="fas fa-sign-out-alt me-1"></i>
                  Cerrar Sesión
              </button>
          </form>
        </li>
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="{% url 'password_change' %}">Cambiar Contraseña</a>
        </li>
        {% else %}
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="{% url 'login' %}">Log-in</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="{% url 'register' %}">Registrarse</a>
        </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
